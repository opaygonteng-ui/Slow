<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINTRUS GACOR - SIMBOL MELEDAK</title>
    <style>
        body {
          background: url('em.png') center/cover no-repeat fixed;
    background-color: #000;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 10px;
    overflow: hidden; 
        }

        #welcomeModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 20000;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a1a1a, #333);
            padding: 30px; border-radius: 20px; border: 3px solid gold;
            box-shadow: 0 0 30px gold; max-width: 320px; width: 90%;
        }

        .grid { display: grid; grid-template-columns: repeat(5, 60px); gap: 5px; justify-content: center; margin-top: 10px; }
        
        .box {
            width: 60px; height: 60px;
            background: rgba(30,30,30,0.8);
            border: 2px solid gold;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; position: relative; border-radius: 8px;
            /* Kotak sekarang statis, tidak bergerak */
        }

        /* Span pembungkus simbol untuk animasi */
        .symbol-text {
            display: inline-block;
            transition: transform 0.2s, opacity 0.2s;
        }

        .rolling { animation: rollSymbol 0.1s infinite linear; }
        @keyframes rollSymbol {
            0% { transform: translateY(-50%); opacity: 0.3; }
            100% { transform: translateY(50%); opacity: 0.3; }
        }

        /* ANIMASI MELEDAK HANYA PADA SIMBOL */
        .symbol-win { 
            animation: explodeSymbol 1s forwards; 
        }

        @keyframes explodeSymbol {
            0% { transform: scale(1); filter: brightness(1); opacity: 1; }
            50% { transform: scale(1.6); filter: brightness(2); text-shadow: 0 0 15px gold; opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Highlight kotak saat menang (opsional, agar jelas kotak mana yang menang) */
        .box-win-highlight {
            border-color: white !important;
            box-shadow: 0 0 10px gold;
        }

        .combo { height: 40px; font-size: 26px; color: #fff700; font-weight: bold; text-shadow: 0 0 10px red; margin: 10px 0; }
        
        .summary-container { display: flex; justify-content: center; gap: 15px; margin-top: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border: 1px solid gold; }
.summary-item { display: flex; flex-direction: column; font-size: 11px; }
        }
        .summary-item { display: flex; flex-direction: column; font-size: 10px; }
        .summary-value { font-weight: bold; font-size: 13px; }

        .action-buttons { margin-top: 15px; display: flex; justify-content: center; gap: 8px; align-items: center; }
        .btn-action { width: 85px; height: 35px; font-size: 11px; font-weight: bold; border-radius: 5px; border: none; color: white; cursor: pointer; }

        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .spin-btn { width: 140px; height: 50px; font-size: 20px; cursor: pointer; background: gold; border: none; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 0 #b8860b; }
        
        #imageOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            justify-content: center; align-items: center; z-index: 30000;
        }
    </style>
</head> 
<body>

<div id="welcomeModal">
    <div class="modal-content">
        <h2 style="color:gold">SELAMAT!</h2>
        <p>Bonus Saldo Awal:</p>
        <span style="font-size:24px; color:#00ff00; font-weight:bold; display:block; margin:10px 0;">Rp 1.000.000,00</span>
        <button class="btn-start" style="padding:10px 20px; font-weight:bold; cursor:pointer;" onclick="startApp()">LOG IN & KLAIM</button>
        </div>
</div>

<h2 style="color: gold; margin: 5px 0;">WINTRUS GACOR</h2>
<div id="coin" style="font-size: 28px; color: #00ff00; font-weight: bold;">Rp 1.000.000</div>
<div id="combo" class="combo"></div>
<div id="grid" class="grid"></div>

<div class="controls">
    <button class="spin-btn" onclick="spin()">SPIN</button>
    <button id="autoBtn" style="width:100px; background:#444; color:white; border:none; border-radius:12px; cursor:pointer;" onclick="toggleAuto()">AUTO: OFF</button>
</div>

<div class="summary-container">
    <div class="summary-item"><span>MODAL</span><span id="res-modal" class="summary-value">1.000.000</span></div>
    <div class="summary-item"><span>MENANG</span><span id="res-win" class="summary-value" style="color: #00ff00;">0</span></div>
    <div class="summary-item"><span>KALAH</span><span id="res-lose" class="summary-value" style="color: #ff4444;">0</span></div>
</div>

<div class="action-buttons">
    <div id="playerNameDisplay" style="color: #00d4ff; font-weight: bold; font-size: 12px;">GUEST</div>
    <button class="btn-action" style="background: #28a745;" onclick="showPrank('wow.jpg')">TOP UP</button>
    <button class="btn-action" style="background: #dc3545;" onclick="showPrank('wow.jpg')">TARIK</button>
</div>

<div id="imageOverlay" onclick="this.style.display='none'">
    <img id="displayImg" src="" style="max-width: 90%; border: 3px solid gold; border-radius: 15px;">
</div>

<script>
// --- INISIALISASI AUDIO ---
const sWin = new Audio("cring.mp3");
const sBohong = new Audio("bohong.mp3"); 


function playCring() {
    sWin.currentTime = 0; 
    sWin.play().catch(e => console.log("Audio diblokir."));
}

let icons = ["🍒", "🍋", "7", "⭐", "💎", "🍇"]; 
let ROW = 4, COL = 5, coin = 1000000, totalMenang = 0, totalKalah = 0, comboCount = 0;
let grid = [], boxSpans = [], isAuto = false, isSpinning = false;

// Init Grid Visual
const gridDiv = document.getElementById("grid");
for (let i = 0; i < ROW * COL; i++) {
    let d = document.createElement("div"); d.className = "box";
    let span = document.createElement("span"); span.className = "symbol-text"; span.innerHTML = icons[Math.floor(Math.random()*icons.length)];
    d.appendChild(span); gridDiv.appendChild(d); boxSpans.push(span);
}

function startApp() {
    let name = prompt("Masukkan Nama Anda:");
    document.getElementById("playerNameDisplay").innerText = (name || "GUEST").toUpperCase();
    document.getElementById("welcomeModal").style.display = "none";
    sWin.play().then(() => { sWin.pause(); sWin.currentTime = 0; }).catch(() => {});
}

function toggleAuto() {
    isAuto = !isAuto;
    document.getElementById("autoBtn").innerHTML = isAuto ? "AUTO: ON" : "AUTO: OFF";
    document.getElementById("autoBtn").style.background = isAuto ? "#ff4444" : "#444";
    if (isAuto && !isSpinning) spin();
}

function updateStats() {
    let f = coin.toLocaleString('id-ID');
    document.getElementById("coin").innerText = "Rp " + f;
    document.getElementById("res-modal").innerText = f;
    document.getElementById("res-win").innerText = totalMenang.toLocaleString('id-ID');
    document.getElementById("res-lose").innerText = totalKalah.toLocaleString('id-ID');
}

function spin() {
    if (isSpinning || coin < 500) return;
    isSpinning = true; comboCount = 0;
    document.getElementById("combo").innerHTML = "";
    coin -= 500; totalKalah += 500; updateStats();

    boxSpans.forEach(span => {
        // Reset state simbol dan kotak
        span.classList.remove("symbol-win");
        span.parentElement.classList.remove("box-win-highlight");
        span.style.opacity = "1";
        span.style.transform = "scale(1)";
        span.classList.add("rolling");
    });

    setTimeout(() => {
        boxSpans.forEach(s => s.classList.remove("rolling"));
        generateGacor(); render();
        setTimeout(cek, 200);
    }, 700);
}

function generateGacor() {
    grid = [];
    let gacor = Math.random() < 0.6; 
    for (let r = 0; r < ROW; r++) {
        let row = [];
        for (let c = 0; c < COL; c++) {
            if (gacor && c > 0 && Math.random() < 0.7) row.push(row[c-1]);
            else row.push(icons[Math.floor(Math.random()*icons.length)]);
        }
        grid.push(row);
    }
}

function render() {
    for (let r = 0; r < ROW; r++) {
        for (let c = 0; c < COL; c++) {
            boxSpans[r*COL+c].innerHTML = grid[r][c] || "";
        }
    }
}

function cek() {
    let winNodes = new Set();
    // Cek Horizontal
    for (let r = 0; r < ROW; r++) {
        for (let c = 0; c < COL - 2; c++) {
            if (grid[r][c] && grid[r][c]===grid[r][c+1] && grid[r][c]===grid[r][c+2]) {
                winNodes.add(r*COL+c); winNodes.add(r*COL+c+1); winNodes.add(r*COL+c+2);
            }
        }
    }
    // Cek Vertikal
    for (let c = 0; c < COL; c++) {
        for (let r = 0; r < ROW - 2; r++) {
            if (grid[r][c] && grid[r][c]===grid[r+1][c] && grid[r][c]===grid[r+2][c]) {
                winNodes.add(r*COL+c); winNodes.add((r+1)*COL+c); winNodes.add((r+2)*COL+c);
            }
        }
    }

    if (winNodes.size > 0) {
        comboCount++;
        playCring();

        let multiplier = comboCount + 1;
        let bonus = (winNodes.size * 1000) * multiplier;
        coin += bonus; totalMenang += bonus;
        document.getElementById("combo").innerHTML = `COMBO X${comboCount} (+Rp ${bonus.toLocaleString()})`;
        
        winNodes.forEach(idx => {
            // Animasi meledak pada SIMBOL (span), bukan kotak
            boxSpans[idx].classList.add("symbol-win");
            // Highlight kotak (opsional)
            boxSpans[idx].parentElement.classList.add("box-win-highlight");
            grid[Math.floor(idx/COL)][idx%COL] = null;
        });

        setTimeout(jatuh, 1000);
    } else {
        isSpinning = false;
        if (isAuto) setTimeout(spin, 800);
    }
    updateStats();
}

function jatuh() {
    for (let c = 0; c < COL; c++) {
        let colSymbols = [];
        for (let r = ROW - 1; r >= 0; r--) if (grid[r][c] !== null) colSymbols.push(grid[r][c]);
        for (let r = ROW - 1; r >= 0; r--) {
            grid[r][c] = colSymbols.length > 0 ? colSymbols.shift() : icons[Math.floor(Math.random()*icons.length)];
            
            let span = boxSpans[r*COL+c];
            // Reset state animasi simbol saat simbol baru muncul/jatuh
            span.classList.remove("symbol-win");
            span.parentElement.classList.remove("box-win-highlight");
            span.style.opacity = "1"; 
            span.style.transform = "scale(1)";
        }
    }
    render();
    setTimeout(cek, 300);
}

function showPrank(src) {
    // Memutar suara bohong
    sBohong.currentTime = 0;
    sBohong.play().catch(e => console.log("Audio diblokir oleh browser."));

    document.getElementById("displayImg").src = src;
    document.getElementById("imageOverlay").style.display = "flex";
}
</script>
</body>
</html>
